[build]
  command = "npm install --prefix server && npm install --prefix Frontend && npm run build --prefix Frontend"
  publish = "Frontend/dist"
  functions = "functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
